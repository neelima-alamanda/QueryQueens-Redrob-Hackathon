# ============================================================================
# AI Tools Declaration
# ============================================================================

ai_tools_used:
  - "ChatGPT"
  - "GitHub Copilot"

ai_usage_summary: |
  ChatGPT was used for architectural discussions, debugging support, code
  review, documentation refinement, and implementation guidance during
  development. GitHub Copilot was used for inline code suggestions and
  developer productivity. The system design, feature engineering, ranking
  strategy, integration, testing, and final implementation were completed,
  validated, and reviewed by the team. No candidate data was submitted to
  external AI services during the ranking process.

# ============================================================================
# Methodology Summary
# ============================================================================

methodology_summary: |
  QueryQueens is an AI-powered candidate ranking system developed for the
  Redrob Data & AI Challenge. The solution combines feature extraction,
  behavioral signal analysis, semantic similarity matching using Sentence
  Transformers, profile consistency validation, honeypot detection, and
  explainable AI. Technical, behavioral, and semantic scores are combined
  using a hybrid ranking strategy to generate the Top 100 candidates along
  with human-readable explanations. A Flask-based dashboard enables users
  to upload candidate data, execute the ranking pipeline, visualize results,
  and download a submission-ready CSV file.

