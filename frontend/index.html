<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Candidate Ranking System</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>
        <h1>AI Candidate Ranking System</h1>
        <p>Redrob Recruiter Dashboard</p>
    </header>

    <!-- Main Container -->
    <main>

        <!-- Upload Section -->
        <section id="upload-section">

            <h2>Upload Candidate Dataset</h2>

            <input
                type="file"
                id="candidateFile"
                accept=".json,.jsonl"
            >

            <button id="rankButton">
                Start Ranking
            </button>
            <p id="message"></p>

        </section>

        <!-- Statistics -->
        <section id="stats-section">

            <div class="card">
                <h3>Candidates</h3>
                <p id="candidateCount">100000</p>
            </div>

            <div class="card">
                <h3>Top Ranked</h3>
                <p id="topCount">100</p>
            </div>

            <div class="card">
                <h3>Runtime</h3>
                <p id="runtime">39 sec</p>
            </div>

            <div class="card">
                <h3>Status</h3>
                <p id="status">Ready</p>
            </div>

        </section>

        <!-- Results Table -->
        <section id="results-section">

            <h2>Top Ranked Candidates</h2>

            <table>

                <thead>

                    <tr>

                        <th>Rank</th>

                        <th>Candidate ID</th>

                        <th>Score</th>

                        <th>View</th>

                    </tr>

                </thead>

                <tbody id="resultsTable">

                </tbody>

            </table>

        </section>

        <!-- Candidate Details -->

        <section id="details-section">

            <h2>Candidate Details</h2>

            <div id="candidateDetails">

                Select a candidate to view details.

            </div>

        </section>

        <!-- Download -->

        <section id="download-section">

            <button id="downloadBtn">

                Download Ranked Candidates (CSV)

            </button>

        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
